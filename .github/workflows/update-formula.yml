name: Update CLIProxyAPI formula

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m unittest tests.test_update_formula -v

      - name: Update formula from upstream release
        run: python scripts/update_formula.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- Formula/cliproxyapi.rb; then
            echo "No formula changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cliproxyapi.rb
          git commit -m "update CLIProxyAPI formula"
          git push
